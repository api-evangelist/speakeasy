specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Speakeasy
providerId: speakeasy
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - AI
  - Documentation
  - MCP
  - Platform
  - SDKs
  - Terraform
  - Testing
description: Speakeasy prices its OpenAPI-driven SDK / MCP / Terraform generation
  platform along three product lines. SDKs & CLIs and AI Control Plane (MCP) ship
  a free tier plus per-language seat-style subscriptions, with Enterprise priced
  on tailored terms. Terraform and Enterprise tiers are quote-based. Operations
  are counted by unique operationId values across licensed languages.
sources:
  - https://www.speakeasy.com/pricing
plans:
  - id: speakeasy-sdks-free
    name: SDKs & CLIs Free
    type: freemium
    description: Free tier of the SDK / CLI / MCP generation platform, capped per
      language by operations.
    entries:
      - label: Operations per Language
        name: operations
        type: quota
        metric: operations
        limit: 250
        timeFrame: month
        geo: global
        unit: 1
        price: '$0'
        userMultiplied: false
    elements:
      - name: SDK & MCP Generation
      - name: Auto-Publish to Package Manager
      - name: OpenAPI Toolchain Access
      - name: Community Slack Support
  - id: speakeasy-sdks-business
    name: SDKs & CLIs Business
    type: subscription
    description: Per-language paid tier for SDKs & CLIs. Billed per language
      licensed; annual prepay discount available.
    entries:
      - label: Subscription (Monthly)
        name: subscription_monthly
        type: subscription
        metric: language
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$720 per language per month'
        userMultiplied: true
      - label: Subscription (Annual)
        name: subscription_annual
        type: subscription
        metric: language
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$600 per language per month, billed annually'
        userMultiplied: true
      - label: Operations per Language
        name: operations
        type: quota
        metric: operations
        limit: 250
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: OAuth Support
      - name: Webhooks
      - name: Server-Sent Events
      - name: Docsite Integration
      - name: Dedicated Slack Support
  - id: speakeasy-sdks-enterprise
    name: SDKs & CLIs Enterprise
    type: enterprise
    description: Tailored pricing for SDKs & CLIs at enterprise scale.
    entries:
      - label: Tailored Subscription
        name: enterprise_subscription
        type: subscription
        metric: varies
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: tailored pricing
        userMultiplied: false
    elements:
      - name: Concierge Onboarding
      - name: Service Level Agreements
      - name: Single Sign-On
      - name: Audit Logs
      - name: Customizable Terms
  - id: speakeasy-ai-control-plane-enterprise
    name: AI Control Plane (MCP) Enterprise
    type: enterprise
    description: Speakeasy's MCP / AI Control Plane offering, billed on requests
      (tool calls made by LLMs to MCP servers). Tailored pricing only.
    entries:
      - label: MCP Tool-Call Requests
        name: mcp_requests
        type: metered
        metric: request
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: tailored pricing
        userMultiplied: false
    elements:
      - name: SaaS Catalog Integrations
      - name: Custom Server Creation
      - name: Code Mode Efficiency
      - name: Serverless Hosting
  - id: speakeasy-terraform-enterprise
    name: Terraform Enterprise
    type: enterprise
    description: Terraform provider generation, billed on number of managed
      resources in the provider. Tailored pricing only.
    entries:
      - label: Managed Terraform Resources
        name: terraform_resources
        type: metered
        metric: resource
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: tailored pricing
        userMultiplied: false
    elements:
      - name: API Mapping
      - name: Pagination
      - name: Retries
      - name: Variable Support
      - name: Attribute Validation / Renaming
      - name: Registry Publishing
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
