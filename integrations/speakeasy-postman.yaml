naftiko: 1.0.0-alpha2
info:
  label: Push Speakeasy registry specs into a Postman workspace
  description: Sync the latest Speakeasy registry revision into a Postman workspace so collection-driven testing teams always run against the same spec the SDKs are generated from.
  tags:
  - Speakeasy
  - Integration
  - API tooling
  - postman
  created: '2026-05-20'
  modified: '2026-05-20'
binds:
- namespace: env
  keys:
    SPEAKEASY_API_KEY: SPEAKEASY_API_KEY
    POSTMAN_API_KEY: POSTMAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: speakeasy
    baseUri: https://api.prod.speakeasy.com
    description: Speakeasy API operations consumed by this integration.
    resources:
    - name: v1-artifacts-namespaces-namespace-name-revisions
      path: /v1/artifacts/namespaces/{namespace_name}/revisions
      operations:
      - name: getrevisions
        method: GET
        description: List the Speakeasy registry revisions for the API under sync.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: namespace_name
          in: path
          type: string
          description: Path parameter namespace_name.
          required: true
    - name: v1-oci-v2-organization-slug-workspace-slug-namespace-name-bl
      path: /v1/oci/v2/{organization_slug}/{workspace_slug}/{namespace_name}/blobs/{digest}
      operations:
      - name: getblob
        method: GET
        description: Pull the spec blob from the Speakeasy registry to upload to Postman.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organization_slug
          in: path
          type: string
          description: Path parameter organization_slug.
          required: true
        - name: workspace_slug
          in: path
          type: string
          description: Path parameter workspace_slug.
          required: true
        - name: namespace_name
          in: path
          type: string
          description: Path parameter namespace_name.
          required: true
        - name: digest
          in: path
          type: string
          description: Path parameter digest.
          required: true
  - type: http
    namespace: postman
    baseUri: https://api.getpostman.com
    description: Postman API operations consumed by this integration.
    resources:
    - name: apis-apiid-versions-versionid-schemas-schemaid
      path: /apis/{apiId}/versions/{versionId}/schemas/{schemaId}
      operations:
      - name: updateapischema
        method: PUT
        description: 'Postman API: updateApiSchema'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: apiId
          in: path
          type: string
          description: Path parameter apiId.
          required: true
        - name: versionId
          in: path
          type: string
          description: Path parameter versionId.
          required: true
        - name: schemaId
          in: path
          type: string
          description: Path parameter schemaId.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: apis
      path: /apis
      operations:
      - name: createapi
        method: POST
        description: 'Postman API: createApi'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: mcp
    namespace: speakeasy-postman-mcp
    description: MCP adapter for the speakeasy-postman integration.
    tools:
    - name: speakeasy_postman
      description: Execute the speakeasy postman integration end-to-end.
      inputSchema:
        type: object
        properties:
          trigger_event:
            type: object
            description: Triggering event payload.
        required:
        - trigger_event
  - type: rest
    namespace: speakeasy-postman-rest
    port: 8080
    description: REST adapter for the speakeasy-postman integration.
    resources:
    - path: /speakeasy-postman
      name: speakeasy-postman
      description: REST surface for the speakeasy-postman integration.
      operations:
      - method: POST
        name: trigger
        description: Trigger the speakeasy-postman integration.
        call: speakeasy_postman
        with:
          trigger_event: rest.body
        outputParameters:
        - type: object
          mapping: $.
