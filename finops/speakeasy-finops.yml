specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Speakeasy
providerId: speakeasy
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - AI
  - Documentation
  - MCP
  - Platform
  - SDKs
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps for Speakeasy — per-language SDK subscriptions,
  request-metered MCP tool calls, and resource-metered Terraform, all on a
  monthly invoicing cycle.
sources:
  - https://www.speakeasy.com/pricing
  - https://www.speakeasy.com/docs
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Speakeasy API, Inc.
serviceCategory: Developer Tools / SDK & MCP Generation
billingModel:
  pricingCategory: Subscription + Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
focusColumns:
  ServiceName: Speakeasy
  ServiceCategory: Developer Tools
  ProviderName: Speakeasy
  PublisherName: Speakeasy API, Inc.
  InvoiceIssuerName: Speakeasy API, Inc.
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: language_subscription
    description: Per-language seat for the SDKs & CLIs Business tier ($720/mo or
      $600/mo annual).
    unit: language-month
    aggregation: sum
    dimensions:
      - language
      - plan
  - name: operations
    description: OpenAPI operations counted by unique operationId per licensed
      language; basis for tier sizing.
    unit: operation
    aggregation: count
    dimensions:
      - language
      - plan
  - name: mcp_tool_call_requests
    description: Tool calls issued by LLMs to MCP servers under the AI Control
      Plane enterprise contract.
    unit: request
    aggregation: sum
    dimensions:
      - server
      - tool
  - name: terraform_managed_resources
    description: Resources managed by a generated Terraform provider; billing
      basis for the Terraform Enterprise plan.
    unit: resource
    aggregation: max
    dimensions:
      - provider
principles:
  - name: Visibility
    description: Workspace dashboards expose operations counts per language and
      tier. Enterprise customers receive usage exports for MCP and Terraform
      meters; consumers should reconcile these against monthly invoices.
  - name: Allocation
    description: Allocate cost by the language seat (each licensed language is
      its own line) and, for AI Control Plane, by MCP server / consuming team.
  - name: Optimization
    description: Hold operationId growth flat where possible to stay under the
      250-operation cap; consolidate duplicate operations in your OpenAPI spec
      before licensing additional languages. Annual billing yields ~17% discount
      versus monthly.
  - name: Accountability
    description: Platform / DX team owns the language license footprint;
      AI / agents team owns the MCP tool-call meter; product owners track
      Terraform resource counts as part of provider design.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
