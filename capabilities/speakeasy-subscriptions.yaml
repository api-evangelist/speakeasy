naftiko: 1.0.0-alpha2
info:
  label: Speakeasy API — Subscriptions
  description: 'Speakeasy API — Subscriptions. 2 operations. Lead operation: Activate an Ignored Namespace for a Subscription.
    Self-contained Naftiko capability covering one Speakeasy business surface.'
  tags:
  - Speakeasy
  - Subscriptions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPEAKEASY_API_KEY: SPEAKEASY_API_KEY
capability:
  consumes:
  - type: http
    namespace: speakeasy-subscriptions
    baseUri: https://api.prod.speakeasy.com
    description: Speakeasy API — Subscriptions business capability. Self-contained, no shared references.
    resources:
    - name: v1-subscriptions-subscriptionID-namespaceName-activate
      path: /v1/subscriptions/{subscriptionID}/{namespaceName}/activate
      operations:
      - name: activatesubscriptionnamespace
        method: POST
        description: Activate an Ignored Namespace for a Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subscriptionID
          in: path
          type: string
          description: The existing subscription ID
          required: true
        - name: namespaceName
          in: path
          type: string
          description: The namespace name
          required: true
    - name: v1-subscriptions-subscriptionID-namespaceName-ignore
      path: /v1/subscriptions/{subscriptionID}/{namespaceName}/ignore
      operations:
      - name: ignoresubscriptionnamespace
        method: POST
        description: Ignored a Namespace for a Subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subscriptionID
          in: path
          type: string
          description: The existing subscription ID
          required: true
        - name: namespaceName
          in: path
          type: string
          description: The namespace name
          required: true
    authentication:
      type: bearer
      token: '{{env.SPEAKEASY_API_KEY}}'
  exposes:
  - type: rest
    namespace: speakeasy-subscriptions-rest
    port: 8080
    description: REST adapter for Speakeasy API — Subscriptions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/subscriptions/{subscriptionid}/{namespacename}/activate
      name: v1-subscriptions-subscriptionid-namespacename-activate
      description: REST surface for v1-subscriptions-subscriptionID-namespaceName-activate.
      operations:
      - method: POST
        name: activatesubscriptionnamespace
        description: Activate an Ignored Namespace for a Subscription
        call: speakeasy-subscriptions.activatesubscriptionnamespace
        with:
          subscriptionID: rest.subscriptionID
          namespaceName: rest.namespaceName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/subscriptions/{subscriptionid}/{namespacename}/ignore
      name: v1-subscriptions-subscriptionid-namespacename-ignore
      description: REST surface for v1-subscriptions-subscriptionID-namespaceName-ignore.
      operations:
      - method: POST
        name: ignoresubscriptionnamespace
        description: Ignored a Namespace for a Subscription
        call: speakeasy-subscriptions.ignoresubscriptionnamespace
        with:
          subscriptionID: rest.subscriptionID
          namespaceName: rest.namespaceName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: speakeasy-subscriptions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Speakeasy API — Subscriptions. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: activate-ignored-namespace-subscription
      description: Activate an Ignored Namespace for a Subscription
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: speakeasy-subscriptions.activatesubscriptionnamespace
      with:
        subscriptionID: tools.subscriptionID
        namespaceName: tools.namespaceName
      outputParameters:
      - type: object
        mapping: $.
    - name: ignored-namespace-subscription
      description: Ignored a Namespace for a Subscription
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: speakeasy-subscriptions.ignoresubscriptionnamespace
      with:
        subscriptionID: tools.subscriptionID
        namespaceName: tools.namespaceName
      outputParameters:
      - type: object
        mapping: $.
