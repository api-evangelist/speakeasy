naftiko: 1.0.0-alpha2
info:
  label: Speakeasy API — SchemaStore
  description: 'Speakeasy API — SchemaStore. 2 operations. Lead operation: Get a OAS Schema from the Schema Store. Self-contained
    Naftiko capability covering one Speakeasy business surface.'
  tags:
  - Speakeasy
  - SchemaStore
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPEAKEASY_API_KEY: SPEAKEASY_API_KEY
capability:
  consumes:
  - type: http
    namespace: speakeasy-schemastore
    baseUri: https://api.prod.speakeasy.com
    description: Speakeasy API — SchemaStore business capability. Self-contained, no shared references.
    resources:
    - name: v1-schema_store
      path: /v1/schema_store
      operations:
      - name: getschemastoreitem
        method: GET
        description: Get a OAS Schema from the Schema Store
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: createschemastoreitem
        method: POST
        description: Create a Schema in the Schema Store
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SPEAKEASY_API_KEY}}'
  exposes:
  - type: rest
    namespace: speakeasy-schemastore-rest
    port: 8080
    description: REST adapter for Speakeasy API — SchemaStore. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/schema-store
      name: v1-schema-store
      description: REST surface for v1-schema_store.
      operations:
      - method: GET
        name: getschemastoreitem
        description: Get a OAS Schema from the Schema Store
        call: speakeasy-schemastore.getschemastoreitem
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createschemastoreitem
        description: Create a Schema in the Schema Store
        call: speakeasy-schemastore.createschemastoreitem
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: speakeasy-schemastore-mcp
    port: 9090
    transport: http
    description: MCP adapter for Speakeasy API — SchemaStore. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-oas-schema-schema-store
      description: Get a OAS Schema from the Schema Store
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: speakeasy-schemastore.getschemastoreitem
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-schema-schema-store
      description: Create a Schema in the Schema Store
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: speakeasy-schemastore.createschemastoreitem
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
