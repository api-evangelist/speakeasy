naftiko: 1.0.0-alpha2
info:
  label: Speakeasy API — ShortURLs
  description: 'Speakeasy API — ShortURLs. 1 operations. Lead operation: Shorten a URL. Self-contained Naftiko capability
    covering one Speakeasy business surface.'
  tags:
  - Speakeasy
  - ShortURLs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPEAKEASY_API_KEY: SPEAKEASY_API_KEY
capability:
  consumes:
  - type: http
    namespace: speakeasy-shorturls
    baseUri: https://api.prod.speakeasy.com
    description: Speakeasy API — ShortURLs business capability. Self-contained, no shared references.
    resources:
    - name: v1-short_urls
      path: /v1/short_urls
      operations:
      - name: create
        method: POST
        description: Shorten a URL
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SPEAKEASY_API_KEY}}'
  exposes:
  - type: rest
    namespace: speakeasy-shorturls-rest
    port: 8080
    description: REST adapter for Speakeasy API — ShortURLs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/short-urls
      name: v1-short-urls
      description: REST surface for v1-short_urls.
      operations:
      - method: POST
        name: create
        description: Shorten a URL
        call: speakeasy-shorturls.create
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: speakeasy-shorturls-mcp
    port: 9090
    transport: http
    description: MCP adapter for Speakeasy API — ShortURLs. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: shorten-url
      description: Shorten a URL
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: speakeasy-shorturls.create
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
